# Generated by `drymint repo init`, then reviewed for this Gradle/KMP layout.
# Drymint v0 does not infer Gradle or Kotlin source-set visibility, so the
# Kotlin resolver partitions below encode the current first-party source graph.

version = "v0"

[index]
# Keep indexing deterministic and avoid generated, vendored, cache, and
# unsupported-language trees.
ignore = [
  ".codex/**",
  ".drymint/**",
  ".git/**",
  ".gradle/**",
  ".idea/**",
  ".kotlin/**",
  "**/.gradle/**",
  "**/.kotlin/**",
  "**/.pytest_cache/**",
  "**/.venv/**",
  "**/__pycache__/**",
  "**/build/**",
  "**/dist/**",
  "**/node_modules/**",
  "**/target/**",
  "**/vendor/**",
  "**/venv/**",
  "build/**",
  "dart/**",
  "dist/**",
  "docs/_site/**",
  "node_modules/**",
  "target/**",
  "tmp/**",
  "vendor/**",
]

[plugins.kotlin]
enabled = true

[languages.kotlin.domains]
rules = [
  # Product-level review domains. Labels below keep cross-cutting module and
  # source-set hints; resolver partitions model Kotlin visibility.
  { domain = "sqlitenow-compiler-tests", match = ["sqlitenow-compiler/src/test/**"] },
  { domain = "sqlitenow-compiler-main", match = ["sqlitenow-compiler/src/main/**"] },
  { domain = "sqlitenow-gradle-plugin-tests", match = ["sqlitenow-gradle-plugin/src/test/**"] },
  { domain = "sqlitenow-gradle-plugin-main", match = ["sqlitenow-gradle-plugin/src/main/**"] },
  { domain = "library-core-tests", match = ["library-core/src/*Test/**"] },
  { domain = "library-core-main", match = ["library-core/src/*Main/**"] },
  { domain = "library-oversqlite-tests", match = ["library-oversqlite/src/*Test/**"] },
  { domain = "library-oversqlite-main", match = ["library-oversqlite/src/*Main/**"] },
  { domain = "platform-core-test-harness-tests", match = ["platform-core-test/harness/src/*Test/**"] },
  { domain = "platform-core-test-harness-main", match = ["platform-core-test/harness/src/*Main/**"] },
  { domain = "platform-oversqlite-test-composeApp-tests", match = ["platform-oversqlite-test/composeApp/src/*Test/**"] },
  { domain = "platform-oversqlite-test-composeApp-main", match = ["platform-oversqlite-test/composeApp/src/*Main/**"] },
  { domain = "sample-kmp-composeApp-main", match = ["sample-kmp/composeApp/src/*Main/**"] },
  { domain = "samplesync-kmp-composeApp-main", match = ["samplesync-kmp/composeApp/src/*Main/**"] },
]

[languages.kotlin.labels]
rules = [
  { label = "module", value = "library-core", match = ["library-core/src/**"] },
  { label = "module", value = "library-oversqlite", match = ["library-oversqlite/src/**"] },
  { label = "module", value = "platform-core-test-harness", match = ["platform-core-test/harness/src/**"] },
  { label = "module", value = "platform-oversqlite-test-composeApp", match = ["platform-oversqlite-test/composeApp/src/**"] },
  { label = "module", value = "sample-kmp-composeApp", match = ["sample-kmp/composeApp/src/**"] },
  { label = "module", value = "samplesync-kmp-composeApp", match = ["samplesync-kmp/composeApp/src/**"] },
  { label = "module", value = "sqlitenow-compiler", match = ["sqlitenow-compiler/src/**"] },
  { label = "module", value = "sqlitenow-gradle-plugin", match = ["sqlitenow-gradle-plugin/src/**"] },
  { label = "source_set", value = "main", match = ["sqlitenow-compiler/src/main/**", "sqlitenow-gradle-plugin/src/main/**"] },
  { label = "source_set", value = "test", match = ["sqlitenow-compiler/src/test/**", "sqlitenow-gradle-plugin/src/test/**"] },
  { label = "source_set", value = "commonMain", match = ["**/src/commonMain/**"] },
  { label = "source_set", value = "commonTest", match = ["**/src/commonTest/**"] },
  { label = "source_set", value = "androidMain", match = ["**/src/androidMain/**"] },
  { label = "source_set", value = "androidDeviceTest", match = ["**/src/androidDeviceTest/**"] },
  { label = "source_set", value = "desktopMain", match = ["**/src/desktopMain/**"] },
  { label = "source_set", value = "iosMain", match = ["**/src/iosMain/**"] },
  { label = "source_set", value = "jsMain", match = ["**/src/jsMain/**"] },
  { label = "source_set", value = "jsTest", match = ["**/src/jsTest/**"] },
  { label = "source_set", value = "jvmMain", match = ["**/src/jvmMain/**"] },
  { label = "source_set", value = "jvmTest", match = ["**/src/jvmTest/**"] },
  { label = "source_set", value = "linuxMain", match = ["**/src/linuxMain/**"] },
  { label = "source_set", value = "macosMain", match = ["**/src/macosMain/**"] },
  { label = "source_set", value = "nativeMain", match = ["**/src/nativeMain/**"] },
  { label = "source_set", value = "nativeTest", match = ["**/src/nativeTest/**"] },
  { label = "source_set", value = "wasmJsMain", match = ["**/src/wasmJsMain/**"] },
  { label = "source_set", value = "wasmJsTest", match = ["**/src/wasmJsTest/**"] },
  { label = "source_set", value = "webMain", match = ["**/src/webMain/**"] },
]

