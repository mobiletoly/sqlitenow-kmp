name: Publish SQLiteNow Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to validate, without the leading v'
        required: true
        type: string
      dry_run:
        description: 'Run validation and archive dry-runs without publishing'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Release SQLiteNow artifacts
    runs-on: macos-26
    env:
      SQLITENOW_RELEASE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
      SQLITENOW_RELEASE_VERSION_INPUT: ${{ inputs.release_version || '' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Validate release versions
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${SQLITENOW_RELEASE_DRY_RUN}" != "true" ]]; then
              echo "Manual release workflow runs are dry-run only; publish by pushing a version tag."
              exit 1
            fi
            release_version="${SQLITENOW_RELEASE_VERSION_INPUT}"
            release_ref_name="v${release_version}"
          else
            release_version="${GITHUB_REF_NAME#v}"
            release_ref_name="${GITHUB_REF_NAME}"
          fi

          if [[ "${release_version}" == *SNAPSHOT* || "${release_version}" == *snapshot* ]]; then
            echo "Refusing to publish snapshot version from ${release_ref_name}."
            exit 1
          fi

          gradle_version="$(grep '^sqlitenow.version=' gradle.properties | cut -d= -f2)"

          echo "Release tag version: ${release_version}"
          echo "Gradle/KMP version: ${gradle_version}"
          echo "SQLITENOW_RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"
          echo "SQLITENOW_RELEASE_TAG=${release_ref_name}" >> "${GITHUB_ENV}"
          echo "SQLITENOW_SWIFTPM_TAG=${release_version}" >> "${GITHUB_ENV}"
          echo "SQLITENOW_SWIFT_RUNTIME_ARTIFACT_BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_ref_name}" >> "${GITHUB_ENV}"
          echo "SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_ref_name}" >> "${GITHUB_ENV}"

          if [[ "${gradle_version}" != "${release_version}" ]]; then
            echo "gradle.properties sqlitenow.version must match ${release_ref_name}."
            exit 1
          fi

      - name: Validate compiler
        run: ./gradlew :sqlitenow-compiler:test --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Validate Gradle plugin
        run: ./gradlew :sqlitenow-gradle-plugin:test --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Validate Swift support gate
        run: ./gradlew swiftHybridSupportGate --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Build and validate Swift runtime release artifacts
        run: ./gradlew swiftRuntimeReleaseArtifactManifestDefaults -Psqlitenow.swiftRuntimeArtifactBaseUrl="${SQLITENOW_SWIFT_RUNTIME_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Build SwiftPM compiler artifact bundle
        run: ./gradlew packageSwiftPmCompilerArtifactBundle -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Stage SwiftPM plugin distribution
        run: ./gradlew stageSwiftPmPluginDistribution -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Inspect SwiftPM plugin distribution
        run: ./gradlew inspectSwiftPmPluginDistribution -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Upload staged SwiftPM plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: swiftpm-plugin-distribution-${{ env.SQLITENOW_RELEASE_VERSION }}
          path: build/swiftpm-plugin-distribution/sqlitenow-kmp
          if-no-files-found: error

      - name: Validate clean SwiftPM consumer with local release artifacts
        run: ./gradlew swiftPmPluginCleanConsumerProof -Psqlitenow.swiftPmCleanConsumerRoot="${RUNNER_TEMP}/sqlitenow-local-clean-consumer" -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" -Psqlitenow.swiftRuntimeArtifactBaseUrl="${SQLITENOW_SWIFT_RUNTIME_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Validate SwiftPM plugin distribution tag locally
        if: env.SQLITENOW_RELEASE_DRY_RUN == 'true'
        run: ./gradlew validateSwiftPmPluginDistributionTag -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Upload Swift release assets
        id: upload_swift_release_assets
        if: env.SQLITENOW_RELEASE_DRY_RUN != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.SQLITENOW_RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            swift/runtime/core/build/runtime-release-artifacts/SQLiteNowCoreRuntime-${{ env.SQLITENOW_RELEASE_VERSION }}.xcframework.zip
            swift/runtime/core/build/runtime-release-artifacts/SQLiteNowCoreRuntime-${{ env.SQLITENOW_RELEASE_VERSION }}.artifact-manifest.json
            swift/runtime/sync/build/runtime-release-artifacts/SQLiteNowSyncRuntime-${{ env.SQLITENOW_RELEASE_VERSION }}.xcframework.zip
            swift/runtime/sync/build/runtime-release-artifacts/SQLiteNowSyncRuntime-${{ env.SQLITENOW_RELEASE_VERSION }}.artifact-manifest.json
            build/swiftpm-compiler-artifacts/SQLiteNowCompiler-${{ env.SQLITENOW_RELEASE_VERSION }}.artifactbundle.zip
            build/swiftpm-compiler-artifacts/SQLiteNowCompiler-${{ env.SQLITENOW_RELEASE_VERSION }}.artifact-manifest.json

      - name: Validate clean SwiftPM consumer from local distribution Git tag
        if: env.SQLITENOW_RELEASE_DRY_RUN != 'true'
        run: ./gradlew swiftPmPluginLocalTagCleanConsumerProof -Psqlitenow.swiftPmCleanConsumerRoot="${RUNNER_TEMP}/sqlitenow-clean-consumer" -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" -Psqlitenow.swiftRuntimeArtifactBaseUrl="${SQLITENOW_SWIFT_RUNTIME_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Publish SwiftPM plugin distribution tag
        id: publish_swiftpm_distribution_tag
        if: env.SQLITENOW_RELEASE_DRY_RUN != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./gradlew publishSwiftPmPluginDistributionTag -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Validate clean SwiftPM consumer from public GitHub tag
        if: env.SQLITENOW_RELEASE_DRY_RUN != 'true'
        run: ./gradlew swiftPmPluginPublicTagCleanConsumerProof -Psqlitenow.swiftPmCleanConsumerRoot="${RUNNER_TEMP}/sqlitenow-public-clean-consumer" -Psqlitenow.swiftPmCleanConsumerDistributionUrl="https://github.com/${GITHUB_REPOSITORY}.git" -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" -Psqlitenow.swiftRuntimeArtifactBaseUrl="${SQLITENOW_SWIFT_RUNTIME_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Validate Xcode consumer from public GitHub tag
        if: env.SQLITENOW_RELEASE_DRY_RUN != 'true'
        run: ./gradlew swiftPmPluginPublicTagXcodeConsumerProof -Psqlitenow.swiftPmPublicTagXcodeConsumerRoot="${RUNNER_TEMP}/sqlitenow-public-xcode-clean-consumer" -Psqlitenow.swiftPmCleanConsumerDistributionUrl="https://github.com/${GITHUB_REPOSITORY}.git" -Psqlitenow.swiftPmCompilerArtifactBaseUrl="${SQLITENOW_SWIFTPM_COMPILER_ARTIFACT_BASE_URL}" -Psqlitenow.swiftRuntimeArtifactBaseUrl="${SQLITENOW_SWIFT_RUNTIME_ARTIFACT_BASE_URL}" --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false

      - name: Roll back public Swift release state after failed public proof
        if: ${{ failure() && env.SQLITENOW_RELEASE_DRY_RUN != 'true' && (steps.upload_swift_release_assets.outcome == 'success' || steps.publish_swiftpm_distribution_tag.outcome == 'success') }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.upload_swift_release_assets.outcome }}" == "success" ]]; then
            gh release delete "${SQLITENOW_RELEASE_TAG}" --cleanup-tag --yes || true
          fi

          if [[ "${{ steps.publish_swiftpm_distribution_tag.outcome }}" == "success" ]]; then
            git push origin ":refs/tags/${SQLITENOW_SWIFTPM_TAG}" || true
          fi

      - name: Publish compiler to Maven Central
        if: env.SQLITENOW_RELEASE_DRY_RUN != 'true'
        run: ./gradlew :sqlitenow-compiler:publishToMavenCentral --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

      - name: Publish KMP artifacts to Maven Central
        if: env.SQLITENOW_RELEASE_DRY_RUN != 'true'
        run: ./gradlew :library-core:publishToMavenCentral :library-oversqlite:publishToMavenCentral :sqlitenow-gradle-plugin:publishToMavenCentral --no-daemon --no-configuration-cache -Dorg.gradle.vfs.watch=false
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

      - name: Confirm release dry run
        if: env.SQLITENOW_RELEASE_DRY_RUN == 'true'
        run: echo "SQLiteNow release dry run completed: Maven/KMP, Swift runtime, SwiftPM plugin, and local clean-consumer proof completed; remote publish and public asset fetch steps were skipped."
