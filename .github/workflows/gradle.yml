# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ github.event_name == 'workflow_call' && 'true' || steps.filter.outputs.code }}
    steps:
    - uses: actions/checkout@v4
      if: ${{ github.event_name != 'workflow_call' }}
    - name: Detect code changes
      if: ${{ github.event_name != 'workflow_call' }}
      id: filter
      uses: dorny/paths-filter@v4
      with:
        predicate-quantifier: every
        filters: |
          code:
            - '**'
            - '!**/*.md'
            - '!docs/**'

  build:
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: :library-core:iosSimulatorArm64Test
            os: macos-26
          - target: :library-core:macosArm64Test
            os: macos-26
          - target: swiftHybridSupportGate
            os: macos-26
          - target: swiftPmPluginDistributionPreflight
            os: macos-26
          - target: :sqlitenow-gradle-plugin:test
            os: ubuntu-latest
          - target: :library-core:jvmTest
            os: ubuntu-latest
          - target: ":library-core:linuxX64Test :library-core:compileTestKotlinLinuxArm64"
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v3
    - uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build with Gradle
      uses: gradle/gradle-build-action@ce999babab2de1c4b649dc15f0ee67e6246c994f
      with:
        arguments: ${{ matrix.target }}

  dart-flutter:
    name: Dart and Flutter
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true
    - name: Build embedded Dart compiler jar
      run: ./gradlew :sqlitenow-compiler:test :sqlitenow-compiler:syncDartCliCompilerJar --no-configuration-cache
    - name: Validate Dart and Flutter packages
      shell: bash
      run: |
        set -euo pipefail

        cd dart
        dart pub get

        dart packages/sqlitenow_cli/bin/sqlitenow_cli.dart generate -c packages/sqlitenow_runtime/sqlitenow.yaml
        git diff --exit-code -- packages/sqlitenow_runtime/test/generated/dart_db.dart

        for target in packages/sqlitenow_runtime packages/sqlitenow_cli packages/sqlitenow_oversqlite examples/dart_console; do
          dart analyze "$target"
        done
        (
          cd packages/sqlitenow_runtime
          dart test
        )
        (
          cd packages/sqlitenow_cli
          dart test
        )
        (
          cd packages/sqlitenow_oversqlite
          dart test
        )
        (
          cd examples/dart_console
          dart test
        )
        (
          cd examples/flutter_todo
          flutter pub get
          flutter analyze
          flutter pub run sqlitenow_cli generate
          flutter test
        )

  flutter-android-integration:
    name: Flutter Android Integration
    needs: changes
    if: ${{ needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true
    - name: Build embedded Dart compiler jar
      run: ./gradlew :sqlitenow-compiler:syncDartCliCompilerJar --no-configuration-cache
    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
    - name: Run Flutter todo integration test on Android
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 35
        target: google_apis
        arch: x86_64
        profile: pixel_6
        script: bash -lc 'set -euo pipefail; cd dart; flutter pub get; cd examples/flutter_todo; flutter pub get; flutter pub run sqlitenow_cli generate; flutter test integration_test -d emulator-5554'
